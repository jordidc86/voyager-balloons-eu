<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Confirmada | Voyager Balloons EU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .result-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #fff 0%, var(--color-bg-alt) 100%);
            padding: 2rem;
            text-align: center;
        }
        .result-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 4rem 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .icon-success {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            display: block;
        }
        h1 {
            font-family: 'Montserrat', sans-serif;
            color: var(--color-text-dark);
            margin-bottom: 1rem;
        }
        p {
            color: var(--color-text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <section class="result-section">
        <div class="result-card">
            <span class="icon-success">🎈</span>
            <h1>¡Reserva Confirmada!</h1>
            <p>Tu vuelo en globo sobre Segovia ha sido reservado con éxito y el pago se ha procesado de forma segura. En breve recibirás un correo electrónico con todos los detalles de tu aventura.</p>
            <a href="index.html" class="btn btn-primary btn-large">Volver a Inicio</a>
        </div>
    </section>
</body>
</html>
