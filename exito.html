<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag: Ads attribution + cross-domain checkout tracking -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=GT-55NTF5CN"></script>
    <script src="/js/google-ads-tracking.js" defer></script>
    <title>Compra Recibida | Voyager Balloons EU</title>
    <meta name="description" content="Confirmación de compra recibida para una experiencia de vuelo en globo con Voyager Balloons.">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preload" href="css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="css/style.css"></noscript>
    <style>
        .result-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #fff 0%, var(--color-bg-alt) 100%);
            padding: 2rem;
            text-align: center;
        }
        .result-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 4rem 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .icon-success {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            display: block;
        }
        h1 {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--color-text-dark);
            margin-bottom: 1rem;
        }
        p {
            color: var(--color-text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <section class="result-section">
        <div class="result-card">
            <span class="icon-success">🎈</span>
            <h1>¡Compra recibida!</h1>
            <p>Gracias por confiar en Voyager Balloons. Si acabas de completar tu pedido en la tienda, recibirás la confirmación por email y podremos coordinar los detalles por WhatsApp.</p>
            <a href="/" class="btn btn-primary btn-large">Volver a Inicio</a>
        </div>
    </section>
</body>
</html>
