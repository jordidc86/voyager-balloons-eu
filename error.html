<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error en el Pago | Voyager Balloons EU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .result-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #fff 0%, #fff5f5 100%);
            padding: 2rem;
            text-align: center;
        }
        .result-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 4rem 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            max-width: 600px;
            border: 1px solid rgba(255, 200, 200, 0.6);
        }
        .icon-error {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            display: block;
        }
        h1 {
            font-family: 'Montserrat', sans-serif;
            color: #e53e3e;
            margin-bottom: 1rem;
        }
        p {
            color: var(--color-text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .btn-outline {
            border-color: #e53e3e;
            color: #e53e3e;
        }
        .btn-outline:hover {
            background-color: #fff5f5;
        }
    </style>
</head>
<body>
    <section class="result-section">
        <div class="result-card">
            <span class="icon-error">⚠️</span>
            <h1>Algo ha salido mal</h1>
            <p>Lo sentimos, no hemos podido procesar tu pago. Tu banco ha denegado la operación o ha ocurrido un error de conexión durante el proceso. Tu reserva no se ha completado y no se ha realizado ningún cargo.</p>
            <a href="index.html#booking" class="btn btn-primary btn-large">Intentarlo de nuevo</a>
        </div>
    </section>
</body>
</html>
