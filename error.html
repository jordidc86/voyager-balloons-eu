<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag: Ads attribution + cross-domain checkout tracking -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=GT-55NTF5CN"></script>
    <script src="/js/google-ads-tracking.js" defer></script>
    <title>No se pudo completar la compra | Voyager Balloons EU</title>
    <meta name="description" content="Página de aviso para compras no completadas en la tienda de Voyager Balloons.">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preload" href="css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="css/style.css"></noscript>
    <style>
        .result-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #fff 0%, #fff5f5 100%);
            padding: 2rem;
            text-align: center;
        }
        .result-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 4rem 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            max-width: 600px;
            border: 1px solid rgba(255, 200, 200, 0.6);
        }
        .icon-error {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            display: block;
        }
        h1 {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #e53e3e;
            margin-bottom: 1rem;
        }
        p {
            color: var(--color-text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .btn-outline {
            border-color: #e53e3e;
            color: #e53e3e;
        }
        .btn-outline:hover {
            background-color: #fff5f5;
        }
    </style>
</head>
<body>
    <section class="result-section">
        <div class="result-card">
            <span class="icon-error">⚠️</span>
            <h1>Algo ha salido mal</h1>
            <p>Lo sentimos, no hemos podido completar la compra. Puedes volver a la tienda segura para intentarlo de nuevo o escribirnos por WhatsApp si necesitas ayuda.</p>
            <a href="https://shop.voyagerballoons.eu/" class="btn btn-primary btn-large">Volver a la Tienda</a>
        </div>
    </section>
</body>
</html>
