<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | Voyager Balloons EU</title>
    <meta name="description" content="La página que buscas no existe. Vuelve a la web de Voyager Balloons para reservar vuelos en globo en Segovia.">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preload" href="/css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/css/style.css"></noscript>
    <style>
        .not-found {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: #FAF9F6;
            text-align: center;
        }
        .not-found-inner {
            max-width: 680px;
        }
        .not-found-code {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: clamp(4rem, 16vw, 9rem);
            line-height: 1;
            color: var(--color-primary);
            margin: 0 0 1rem;
        }
        .not-found h1 {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: clamp(2rem, 5vw, 3.4rem);
            margin: 0 0 1rem;
            color: var(--color-text-dark);
        }
        .not-found p {
            color: var(--color-text-muted);
            font-size: 1.1rem;
            margin: 0 auto 2rem;
            max-width: 560px;
        }
        .not-found-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <main class="not-found">
        <div class="not-found-inner">
            <p class="not-found-code">404</p>
            <h1>No encontramos esta página</h1>
            <p>Puede que el enlace haya cambiado. Puedes volver a la página principal o ir directamente a la tienda para reservar tu vuelo en globo en Segovia.</p>
            <div class="not-found-actions">
                <a href="/" class="btn btn-primary btn-large">Volver al inicio</a>
                <a href="https://shop.voyagerballoons.eu/" class="btn btn-outline btn-large">Ir a la tienda</a>
            </div>
        </div>
    </main>
</body>
</html>
